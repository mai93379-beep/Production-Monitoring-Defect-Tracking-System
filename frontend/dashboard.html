<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Production Monitoring System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar glass">
            <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-industry" style="color: white;"></i>
                </div>
                <h2 style="font-size: 1.25rem; font-weight: 700;">PRO-MON</h2>
            </div>
            
            <nav>
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="defects.html" class="nav-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Defects</span>
                </a>
                <a href="#" id="settingsBtn" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <a href="#" id="logoutBtn" class="nav-item" style="margin-top: 2rem; color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>

            <div style="position: absolute; bottom: 2rem; left: 1.5rem; right: 1.5rem;">
                <div class="glass" style="padding: 1rem; border-radius: 12px; display: flex; align-items: center; gap: 0.75rem;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700;">
                        <span id="userInitial">U</span>
                    </div>
                    <div>
                        <div id="userName" style="font-size: 0.875rem; font-weight: 600;">User Name</div>
                        <div id="userRole" style="font-size: 0.75rem; color: var(--text-muted);">Role</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 700;">Production Overview</h1>
                    <p style="color: var(--text-muted);">Real-time monitoring of all lines</p>
                </div>
                <div class="glass" style="padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-calendar" style="color: var(--primary);"></i>
                    <span id="currentDate">May 13, 2026</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass">
                    <div class="stat-label">Total Output</div>
                    <div class="stat-value" id="totalOutput">0</div>
                    <div style="font-size: 0.875rem; color: var(--success);">
                        <i class="fas fa-caret-up"></i> 12% from yesterday
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-label">Active Lines</div>
                    <div class="stat-value" id="activeLines">0/5</div>
                    <div style="font-size: 0.875rem; color: var(--text-muted);">
                        Operational efficiency: 84%
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-label">Total Defects</div>
                    <div class="stat-value" id="totalDefects" style="color: var(--danger);">0</div>
                    <div style="font-size: 0.875rem; color: var(--danger);">
                        <i class="fas fa-caret-up"></i> 4% vs target
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                <div class="glass" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem;">Line Status</h3>
                    <div id="linesContainer" class="lines-grid">
                        <!-- Lines will be loaded here -->
                    </div>
                </div>
                <div class="glass" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem;">Recent Logs</h3>
                    <div id="logsContainer" style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto;">
                        <!-- Logs will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
